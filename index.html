<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GM 全服邮件配置中台 | S-级运营后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Noto Sans SC', 'JetBrains Mono', system-ui, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
    }
    .font-mono { font-family: 'JetBrains Mono', monospace !important; }
    /* 熔断红光闪烁 */
    @keyframes fusePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
      50% { box-shadow: 0 0 60px 20px rgba(239, 68, 68, 0.35); }
    }
    @keyframes fuseFlash {
      0%, 100% { background-color: rgba(239, 68, 68, 0); }
      50% { background-color: rgba(239, 68, 68, 0.08); }
    }
    .fuse-active {
      animation: fusePulse 1.2s ease-in-out infinite;
      border-color: #ef4444 !important;
    }
    .fuse-flash-overlay {
      animation: fuseFlash 0.8s ease-in-out infinite;
      pointer-events: none;
    }
    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    /* tooltip */
    [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      font-size: 12px;
      color: #e2e8f0;
      white-space: nowrap;
      z-index: 50;
      pointer-events: none;
    }
    .glass-panel {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(71, 85, 105, 0.4);
    }
    .input-focus-ring:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
    }
    .diff-highlight {
      background: rgba(127, 29, 29, 0.3) !important;
      border-left: 3px solid #ef4444;
    }
    /* shimmer loading */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;
    const { motion, AnimatePresence } = window.Motion;

    // ===== 图标组件 (内联 SVG，避免外部依赖风险) =====
    const Icons = {
      Mail: () => (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      ),
      ShieldCheck: () => (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>
      ),
      FileText: () => (
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
      ),
      AlertTriangle: () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      ),
      Lock: () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      ),
      User: () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      ),
      Activity: () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-2.48a2 2 0 0 0-1.93 1.46l-2.35 8.36a.25.25 0 0 1-.48 0L9.24 2.18a.25.25 0 0 0-.48 0l-2.35 8.36A2 2 0 0 1 4.49 12H2"/></svg>
      ),
      CheckCircle: () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
      ),
      XCircle: () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
      ),
      ChevronRight: () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      ),
      Send: () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4 20-7z"/><path d="M22 2 11 13"/></svg>
      ),
      Info: () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      ),
      Clock: () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      ),
      Zap: () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>
      ),
      Database: () => (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>
      ),
      Menu: () => (
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg>
      ),
    };

    // ===== 工具函数 =====
    const formatDate = (d = new Date()) => {
      const pad = (n) => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    };

    // ===== 道具类型配置（含动态阈值） =====
    const ATTACHMENT_TYPES = [
      { value: 'credit', label: '信用点', desc: '基础货币' },
      { value: 'exp', label: '经验书', desc: '角色培养素材' },
      { value: 'stellar', label: '星琼', desc: '高价值抽卡货币' },
      { value: 'ticket', label: '专票', desc: '限定跃迁凭证' },
    ];

    // 字典化动态阈值配置
    const ATTACHMENT_THRESHOLDS = {
      credit:  { warning: 100000, fuse: 1000000, unit: '信用点' },
      exp:     { warning: 50,     fuse: 100,      unit: '本' },
      stellar: { warning: 1000,   fuse: 2000,     unit: '星琼' },
      ticket:  { warning: 5,      fuse: 10,       unit: '张' },
    };

    const STANDARD_TEMPLATE = {
      title: '【常规】版本维护补偿',
      body: '亲爱的开拓者：\n\n本次停服维护已完成，感谢大家的耐心等待。\n\n如有任何问题，请联系客服。',
      attachmentType: 'credit',
      attachmentTypeLabel: '信用点',
      quantity: 100000, // 信用点的标准模板预警线
    };

    // ===== 主组件 =====
    function App() {
      // ---- 导航状态 ----
      const [activeNav, setActiveNav] = useState('mail');
      const [sidebarOpen, setSidebarOpen] = useState(false);

      // ---- 表单状态 ----
      const [title, setTitle] = useState('【3.2版本】遐蝶剧情上线全服福利');
      const [body, setBody] = useState('亲爱的开拓者：\n\n3.2版本「走过安眠地的花丛」现已正式上线。\n\n为感谢大家的支持，全服发放如下福利。');
      const [attachType, setAttachType] = useState('stellar');
      const [quantity, setQuantity] = useState(1600);
      const [confirmedWarning, setConfirmedWarning] = useState(false);

      // ---- Modal 状态 ----
      const [showDiffModal, setShowDiffModal] = useState(false);
      const [diffDecisions, setDiffDecisions] = useState({});
      const [submitting, setSubmitting] = useState(false);
      const [submitSuccess, setSubmitSuccess] = useState(false);

      // ---- 模拟数据 ----
      const [sentimentScore, setSentimentScore] = useState(32);
      const [sentimentTrend, setSentimentTrend] = useState('stable'); // up, down, stable

      // LLM 舆情指数动态波动
      useEffect(() => {
        const interval = setInterval(() => {
          setSentimentScore(prev => {
            const delta = Math.floor(Math.random() * 5) - 2; // -2 ~ +2
            const next = Math.max(28, Math.min(36, prev + delta));
            setSentimentTrend(next > prev ? 'up' : next < prev ? 'down' : 'stable');
            return next;
          });
        }, 3000);
        return () => clearInterval(interval);
      }, []);

      const [auditLogs] = useState([
        { id: 1, time: '2026-04-21 23:14:22', user: '运营-Aki', action: '修改邮件标题', detail: '原标题：3.2版本福利 → 新标题：3.2版本遐蝶剧情上线全服福利' },
        { id: 2, time: '2026-04-21 22:58:07', user: '运营-Aki', action: '调整附件数量', detail: '星琼 800 → 1600' },
        { id: 3, time: '2026-04-21 22:45:33', user: '系统', action: '自动保存草稿', detail: '会话 ID: sess_7f8a9b2c' },
      ]);

      // ---- 当前道具阈值 ----
      const currentLimits = ATTACHMENT_THRESHOLDS[attachType];

      // ---- 计算属性：状态机（基于动态阈值） ----
      const isHighValue = attachType === 'stellar' || attachType === 'ticket';

      const gachaEqui = useMemo(() => {
        if (attachType === 'stellar') return Math.floor(quantity / 160);
        if (attachType === 'ticket') return quantity; // 专票本身就是抽卡道具
        return null;
      }, [quantity, attachType]);

      const zone = useMemo(() => {
        if (quantity <= currentLimits.warning) return 'safe';
        if (quantity <= currentLimits.fuse) return 'warning';
        return 'fuse';
      }, [quantity, currentLimits]);

      const isFuse = zone === 'fuse';
      const isWarning = zone === 'warning';
      const isSafe = zone === 'safe';

      const canSubmit = useMemo(() => {
        if (isFuse) return false;
        if (isWarning && !confirmedWarning) return false;
        return true;
      }, [isFuse, isWarning, confirmedWarning]);

      // ---- 处理函数 ----
      const handleQuantityChange = (e) => {
        const val = e.target.value;
        if (val === '') { setQuantity(''); return; }
        const num = parseInt(val, 10);
        if (isNaN(num)) return;
        if (num < 0) return; // 拦截负数输入
        setQuantity(num);
        if (num <= currentLimits.warning) setConfirmedWarning(false);
      };

      const handleTypeChange = (e) => {
        const type = e.target.value;
        setAttachType(type);
        setConfirmedWarning(false);
      };

      const getCurrentAttachmentLabel = () => {
        const found = ATTACHMENT_TYPES.find(t => t.value === attachType);
        return found ? found.label : attachType;
      };

      // Diff 数据生成
      const getDiffData = useCallback(() => {
        const current = {
          title,
          body,
          attachmentType: getCurrentAttachmentLabel(),
          quantity,
        };
        const tmpl = {
          ...STANDARD_TEMPLATE,
          attachmentTypeLabel: getCurrentAttachmentLabel(),
          quantity: ATTACHMENT_THRESHOLDS[attachType].warning, // 模板的 quantity 跟随当前类型的预警线
        };
        const fields = [
          { key: 'title', label: '邮件标题', left: current.title, right: tmpl.title },
          { key: 'body', label: '正文内容', left: current.body, right: tmpl.body, isText: true },
          { key: 'attachmentType', label: '附件类型', left: current.attachmentType, right: tmpl.attachmentTypeLabel },
          { key: 'quantity', label: '附件数量', left: String(current.quantity), right: String(tmpl.quantity) },
        ];
        return fields.map(f => ({ ...f, hasDiff: f.left !== f.right }));
      }, [title, body, attachType, quantity]);

      const handleOpenDiff = () => {
        setDiffDecisions({});
        setShowDiffModal(true);
      };

      const handleDiffDecision = (key, value) => {
        setDiffDecisions(prev => ({ ...prev, [key]: value }));
      };

      const diffData = useMemo(() => getDiffData(), [getDiffData]);
      const diffFields = diffData.filter(d => d.hasDiff);
      const allDiffsConfirmed = diffFields.length > 0 && diffFields.every(d => diffDecisions[d.key] === 'confirm');
      const hasRejectedDiff = diffFields.some(d => diffDecisions[d.key] === 'reject');

      const handleFinalSubmit = () => {
        setSubmitting(true);
        setTimeout(() => {
          setSubmitting(false);
          setSubmitSuccess(true);
          setTimeout(() => {
            setShowDiffModal(false);
            setSubmitSuccess(false);
          }, 2000);
        }, 1500);
      };

      const quantityInputBorder = isFuse
        ? 'border-red-500 ring-2 ring-red-500/50'
        : isWarning
        ? 'border-amber-500 ring-2 ring-amber-500/40'
        : isHighValue
        ? 'border-orange-400 ring-1 ring-orange-400/30'
        : 'border-blue-500/60 focus:border-blue-400';

      const quantityBg = isFuse
        ? 'bg-red-950/40'
        : isWarning
        ? 'bg-amber-950/30'
        : 'bg-slate-900/60';

      return (
        <div className="min-h-screen bg-slate-900 text-slate-200 flex relative overflow-hidden">
          {/* 熔断全屏红光遮罩 */}
          <AnimatePresence>
            {isFuse && (
              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 z-40 fuse-flash-overlay pointer-events-none"
              />
            )}
          </AnimatePresence>

          {/* ===== 移动端侧边栏遮罩 ===== */}
          <AnimatePresence>
            {sidebarOpen && (
              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-40 md:hidden"
                onClick={() => setSidebarOpen(false)}
              />
            )}
          </AnimatePresence>

          {/* ===== 左侧边栏 ===== */}
          <aside className={`
            fixed md:static inset-y-0 left-0 z-50 w-64 md:w-60
            bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0
            transform transition-transform duration-300 ease-out
            ${sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}
          `}>
            <div className="p-5 border-b border-slate-800 flex items-center justify-between">
              <div className="flex items-center gap-2.5">
                <div className="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/20">
                  <Icons.Mail />
                </div>
                <div>
                  <h1 className="text-sm font-bold text-slate-100 tracking-wide">GM 运营中台</h1>
                  <p className="text-[10px] text-slate-500 font-mono">v2.4.1-stable</p>
                </div>
              </div>
              {/* 移动端关闭按钮 */}
              <button
                onClick={() => setSidebarOpen(false)}
                className="md:hidden w-8 h-8 rounded-lg hover:bg-slate-800 flex items-center justify-center text-slate-400"
              >
                ✕
              </button>
            </div>

            <nav className="flex-1 p-3 space-y-1">
              {[
                { id: 'mail', label: '邮件配置', icon: Icons.Mail, badge: null },
                { id: 'gray', label: '灰度校验', icon: Icons.ShieldCheck, badge: '2' },
                { id: 'audit', label: '审计日志', icon: Icons.FileText, badge: null },
              ].map(item => (
                <button
                  key={item.id}
                  onClick={() => { setActiveNav(item.id); setSidebarOpen(false); }}
                  className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all duration-200 group relative ${
                    activeNav === item.id
                      ? 'bg-blue-600/15 text-blue-400 border border-blue-500/30'
                      : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50'
                  }`}
                >
                  <item.icon />
                  <span className="flex-1 text-left">{item.label}</span>
                  {item.badge && (
                    <span className="px-1.5 py-0.5 rounded text-[10px] bg-amber-500/20 text-amber-400 border border-amber-500/30 font-mono">
                      {item.badge}
                    </span>
                  )}
                  {activeNav === item.id && (
                    <motion.div
                      layoutId="activeNav"
                      className="absolute left-0 top-1/2 -translate-y-1/2 w-0.5 h-5 bg-blue-400 rounded-full"
                    />
                  )}
                </button>
              ))}
            </nav>

            <div className="p-4 border-t border-slate-800">
              <div className="glass-panel rounded-lg p-3 space-y-2">
                <div className="flex items-center gap-2 text-xs text-slate-400">
                  <Icons.Database />
                  <span>系统状态</span>
                </div>
                <div className="flex items-center justify-between text-xs">
                  <span className="text-slate-500">API 延迟</span>
                  <span className="text-emerald-400 font-mono">24ms</span>
                </div>
                <div className="flex items-center justify-between text-xs">
                  <span className="text-slate-500">数据库</span>
                  <span className="text-emerald-400 font-mono">正常</span>
                </div>
                <div className="flex items-center justify-between text-xs">
                  <span className="text-slate-500">灰度通道</span>
                  <span className="text-blue-400 font-mono">3/5 就绪</span>
                </div>
              </div>
            </div>
          </aside>

          {/* ===== 右侧主内容区 ===== */}
          <main className="flex-1 flex flex-col min-w-0 min-h-screen">
            {/* 顶部栏 */}
            <header className="h-14 bg-slate-950/80 border-b border-slate-800 flex items-center justify-between px-4 md:px-6 backdrop-blur-sm">
              <div className="flex items-center gap-3 md:gap-6">
                {/* 移动端汉堡菜单 */}
                <button
                  onClick={() => setSidebarOpen(true)}
                  className="md:hidden w-9 h-9 rounded-lg hover:bg-slate-800 flex items-center justify-center text-slate-400 transition-colors"
                >
                  <Icons.Menu />
                </button>

                <div className="hidden md:flex items-center gap-2 text-xs text-slate-400">
                  <Icons.Clock />
                  <span className="font-mono">{formatDate()}</span>
                </div>
                <div className="hidden md:block h-4 w-px bg-slate-700" />
                <div className="flex items-center gap-2 text-xs">
                  <span className="text-slate-500 hidden sm:inline">当前环境:</span>
                  <span className="px-2 py-0.5 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 font-mono text-[10px]">PROD</span>
                </div>
              </div>

              <div className="flex items-center gap-3 md:gap-6">
                {/* LLM 舆情指数 */}
                <div className="flex items-center gap-2 md:gap-3 px-2 md:px-3 py-1.5 rounded-lg bg-slate-800/50 border border-slate-700/50">
                  <div className="flex items-center gap-1.5 text-xs text-slate-400">
                    <Icons.Activity />
                    <span className="hidden sm:inline">LLM 舆情指数</span>
                  </div>
                  <div className="flex items-center gap-1 md:gap-2">
                    <div className={`w-2 h-2 rounded-full ${
                      sentimentScore < 40 ? 'bg-emerald-400' : sentimentScore < 70 ? 'bg-amber-400' : 'bg-red-400'
                    } animate-pulse`} />
                    <span className={`text-sm font-bold font-mono ${

                      {/* 历史模板 */}
                      <div>
                        <div className="px-3 md:px-4 py-3 bg-slate-700/30 border-b border-slate-700 flex items-center gap-2">
                          <div className="w-2 h-2 rounded-full bg-slate-500" />
                          <span className="text-xs font-bold text-slate-400">历史标准模板 (只读)</span>
                        </div>
                        <div className="divide-y divide-slate-700/50">
                          {diffData.map(field => (
                            <div
                              key={`right-${field.key}`}
                              className={`px-3 md:px-4 py-3 ${field.hasDiff ? 'diff-highlight' : ''}`}
                            >
                              <div className="text-[10px] text-slate-500 mb-1">{field.label}</div>
                              <div className="text-xs text-slate-400">
                                {field.isText ? (
                                  <pre className="whitespace-pre-wrap font-mono leading-relaxed">{field.right}</pre>
                                ) : (
                                  <span className="font-mono">{field.right}</span>
                                )}
                              </div>

                              {/* 差异项处理意见 */}
                              {field.hasDiff && (
                                <div className="mt-3 pt-3 border-t border-red-500/20">
                                  <div className="text-[10px] text-slate-500 mb-2">处理意见</div>
                                  <div className="flex items-center gap-4">
                                    <label className="flex items-center gap-2 cursor-pointer group">
                                      <div className={`w-4 h-4 rounded-full border flex items-center justify-center transition-all ${
                                        diffDecisions[field.key] === 'confirm'
                                          ? 'bg-emerald-500 border-emerald-500'
                                          : 'border-slate-600 group-hover:border-emerald-500/60'
                                      }`}>
                                        {diffDecisions[field.key] === 'confirm' && <div className="w-1.5 h-1.5 rounded-full bg-white" />}
                                      </div>
                                      <input
                                        type="radio"
                                        name={`diff-${field.key}`}
                                        checked={diffDecisions[field.key] === 'confirm'}
                                        onChange={() => handleDiffDecision(field.key, 'confirm')}
                                        className="hidden"
                                      />
                                      <span className={`text-xs ${diffDecisions[field.key] === 'confirm' ? 'text-emerald-400' : 'text-slate-500'}`}>
                                        确认无误
                                      </span>
                                    </label>
                                    <label className="flex items-center gap-2 cursor-pointer group">
                                      <div className={`w-4 h-4 rounded-full border flex items-center justify-center transition-all ${
                                        diffDecisions[field.key] === 'reject'
                                          ? 'bg-red-500 border-red-500'
                                          : 'border-slate-600 group-hover:border-red-500/60'
                                      }`}>
                                        {diffDecisions[field.key] === 'reject' && <div className="w-1.5 h-1.5 rounded-full bg-white" />}
                                      </div>
                                      <input
                                        type="radio"
                                        name={`diff-${field.key}`}
                                        checked={diffDecisions[field.key] === 'reject'}
                                        onChange={() => handleDiffDecision(field.key, 'reject')}
                                        className="hidden"
                                      />
                                      <span className={`text-xs ${diffDecisions[field.key] === 'reject' ? 'text-red-400' : 'text-slate-500'}`}>
                                        退回修改
                                      </span>
                                    </label>
                                  </div>
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Modal 底部 */}
                  <div className="px-4 md:px-6 py-4 border-t border-slate-700 bg-slate-800/30 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
                    <div className="flex items-center gap-2 text-xs">
                      <div className={`w-2 h-2 rounded-full ${
                        hasRejectedDiff ? 'bg-red-400' : allDiffsConfirmed ? 'bg-emerald-400' : 'bg-slate-600'
                      }`} />
                      <span className={
                        hasRejectedDiff ? 'text-red-400' : allDiffsConfirmed ? 'text-emerald-400' : 'text-slate-500'
                      }>
                        {hasRejectedDiff
                          ? '存在退回项，流程已阻断'
                          : allDiffsConfirmed
                          ? '所有差异项已确认无误'
                          : `待处理差异项: ${diffFields.filter(d => diffDecisions[d.key] == null).length}`}
                      </span>
                    </div>
                    <div className="flex items-center gap-3 w-full sm:w-auto">
                      <button
                        onClick={() => setShowDiffModal(false)}
                        disabled={submitting}
                        className="px-4 py-2 rounded-lg text-sm text-slate-400 hover:text-slate-200 hover:bg-slate-700 transition-colors disabled:opacity-50 flex-1 sm:flex-none"
                      >
                        取消
                      </button>
                      {hasRejectedDiff ? (
                        <motion.button
                          whileHover={{ scale: 1.02 }}
                          whileTap={{ scale: 0.98 }}
                          onClick={() => setShowDiffModal(false)}
                          className="px-6 py-2.5 rounded-lg text-sm font-medium flex items-center gap-2 transition-all bg-red-600 text-white hover:bg-red-500 shadow-lg shadow-red-600/20 flex-1 sm:flex-none justify-center"
                        >
                          <Icons.XCircle />
                          一键退回修改
                        </motion.button>
                      ) : (
                        <motion.button
                          whileHover={allDiffsConfirmed ? { scale: 1.02 } : {}}
                          whileTap={allDiffsConfirmed ? { scale: 0.98 } : {}}
                          onClick={handleFinalSubmit}
                          disabled={!allDiffsConfirmed || submitting}
                          className={`px-6 py-2.5 rounded-lg text-sm font-medium flex items-center gap-2 transition-all flex-1 sm:flex-none justify-center ${
                            allDiffsConfirmed
                              ? 'bg-blue-600 text-white hover:bg-blue-500 shadow-lg shadow-blue-600/20'
                              : 'bg-slate-700 text-slate-500 cursor-not-allowed'
                          }`}
                        >
                          {submitting ? (
                            <>
                              <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                              提交中...
                            </>
                          ) : (
                            <>
                              <Icons.ChevronRight />
                              确认进入双人灰度流
                            </>
                          )}
                        </motion.button>
                      )}
                    </div>
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
